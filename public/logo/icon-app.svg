<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Cristocentria">
  <!--
    Cristocentria Icon — versão quadrada com border-radius 22%
    Para: app icons, favicon, avatar, OG image
    O globo é ampliado para preencher mais o espaço
  -->

  <!-- Fundo quadrado com border-radius 22% de 64 = ~14px -->
  <rect width="64" height="64" rx="14" ry="14" fill="#0A0A0A"/>

  <!-- Globo maior: r=22, centro em 32,32 → ocupa de y=10 a y=54 -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#F8F6F1" stroke-width="1"/>
  <ellipse cx="32" cy="32" rx="22" ry="6.5" fill="none" stroke="#F8F6F1" stroke-width="1"/>
  <line x1="10" y1="32" x2="54" y2="32" stroke="#F8F6F1" stroke-width="0.75" stroke-linecap="round"/>
  <ellipse cx="32" cy="21" rx="17.5" ry="4" fill="none" stroke="#F8F6F1" stroke-width="0.75"/>
  <ellipse cx="32" cy="43" rx="17.5" ry="4" fill="none" stroke="#F8F6F1" stroke-width="0.75"/>

  <!-- Cruz: vertical de y=10 a y=54, horizontal no TERÇO SUPERIOR
       1/3 = 10 + (54-10)/3 = 10 + 14.7 ≈ 25 -->
  <line x1="32" y1="10" x2="32" y2="54" stroke="#F8F6F1" stroke-width="3" stroke-linecap="round"/>
  <line x1="20" y1="25" x2="44" y2="25" stroke="#F8F6F1" stroke-width="3" stroke-linecap="round"/>
</svg>
